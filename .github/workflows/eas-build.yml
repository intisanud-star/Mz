name: EAS Build
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Ensure assets exist
        run: |
          mkdir -p assets
          npx -y download-cli https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/icon.png --out assets
          npx -y shx cp assets/icon.png assets/adaptive-icon.png
          npx -y shx cp assets/icon.png assets/splash.png

      - name: Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli build --platform android --profile preview --non-interactive
